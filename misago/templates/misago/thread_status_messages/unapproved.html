{% load i18n %}

<li class="status-message status-message-unapproved">
  <div class="status-message-icon">
    {% include "tabler/shield-filled.svg" %}
  </div>
  <div class="status-message-body">
    <div class="status-message-content">
      <p class="status-message-text">
        {% blocktranslate trimmed context "thread unapproved status message" %}
          Requires moderator approval before other users can see it.
        {% endblocktranslate %}
      </p>
    </div>
  </div>
</li>
