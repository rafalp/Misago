{% load i18n %}


{% if posts_moderation_actions %}
<div class="fixed-moderation">
  <div class="container">
    <div class="dropup">
      <button
        class="btn btn-moderation dropdown-toggle"
        type="button"
        id="posts-moderation-menu"
        data-toggle="dropdown"
        aria-haspopup="true"
        aria-expanded="false"
        hx-target="#misago-htmx-moderation-modal"
        mg-error="#modal-error"
        mg-loader="#modal-loader"
      >
      </button>
      <ul class="dropdown-menu dropdown-menu-right" aria-labelledby="posts-moderation-menu">
        <li>
          <button
            class="btn btn-link"
            type="button"
            mg-moderation-action="remove-selection"
          >
            {% translate "Clear selection" context "moderation menu" %}
          </button>
        </li>
        <li role="separator" class="divider"></li>
        {% for action in posts_moderation_actions %}
          <li>
            <button
              class="btn btn-link"
              type="button"
              mg-moderation-action="{{ action.id }}"{% if action.multistage %}
              mg-moderation-multistage="true"{% endif %}{% if action.full_name %}
              mg-moderation-full-name="{{ action.full_name }}"{% endif %}
            >
              {{ action.button_label }}
            </button>
          </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
<div
  id="moderation-modal"
  class="modal fade"
  style="display: none"
  aria-hidden="false"
  tabindex="-1"
>
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <button type="button" class="close" data-dismiss="modal" aria-label="{% translate 'Close' context 'modal' %}"><span aria-hidden="true">&times;</span></button>
        <h4 class="modal-title" mg-modal-title></h4>
      </div>
      <div id="misago-htmx-moderation-modal"></div>
    </div>
  </div>
</div>
<script type="text/javascript">
  const moderation = misago.bulkModeration({
    menu: ".fixed-moderation",
    form: "#posts-moderation",
    field: "posts_moderation",
    modal: "#moderation-modal",
    actions: ".fixed-moderation ul button",
    selection: ".posts-feed-item-checkbox input:checked",
    button: {
      selector: "#posts-moderation-menu",
      text: pgettext("posts moderation", "Moderate posts (%(number)s)"),
    }
  })
</script>
{% endif %}
