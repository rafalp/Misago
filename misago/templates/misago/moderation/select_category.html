{% load i18n misago_forms %}

{% with field=form.category %}
  <div class="form-group{% if field.errors %} has-error{% endif %}">
    <label class="control-label" for="{{ field.id_for_label }}">
      {% translate "Category:" context "moderation select category form" %}
    </label>
    <select class="form-control" name="{{ field.html_name }}" id="{{ field.id_for_label }}" required>
      {% for choice in field.subwidgets %}
        <option value="{{ choice.data.value }}"{% if choice.data.value in form.disallowed_categories %} disabled{% else %}{{ choice|selectedhtml }}{% endif %}>
          {{ choice.choice_label }}
        </option>
      {% endfor %}
    </select>
    {% for error in field.errors %}
      <p class="help-block">{{ error }}</p>
    {% endfor %}
  </div>
{% endwith %}
