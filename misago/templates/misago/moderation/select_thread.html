{% load i18n misago_forms %}

{% with field=form.thread %}
  <div class="form-group{% if field.errors %} has-error{% endif %}">
    <label class="control-label" for="{{ field.id_for_label }}">
      {% translate "Link to the thread:" context "moderation select thread form" %}
    </label>
    <input type="text" class="form-control" maxlength="{{ field.field.max_length }}" id="{{ field.id_for_label }}" name="{{ field.html_name }}" value="{{ field.value|default:'' }}" required />
    {% for error in field.errors %}
      <p class="help-block">{{ error }}</p>
    {% endfor %}
  </div>
{% endwith %}
{% with field=form.redirect %}
  <div class="form-group">
    <div class="control-label">
      {% translate "Options:" context "moderation select thread form" %}
    </div>
    <div class="form-control-choices">
      <div class="checkbox">
        <label>
          <input name="{{ field.html_name }}" type="checkbox" value="1"{% if field.data %} checked{% endif %}> {% translate "Redirect to the new thread" context "moderation new thread form" %}
        </label>
      </div>
    </div>
  </div>
{% endwith %}
